<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akash Vault | Aurora OS</title>
    <style>
        :root {
            --accent: #00f2ff;
            --secondary: #bc13fe;
            --danger: #ff4d4d;
            --bg: #030305;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; min-height: 100vh; }
        .aurora { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 80% 20%, #1a1a4e 0%, transparent 40%), radial-gradient(circle at 20% 80%, #2e1a4e 0%, transparent 40%); z-index: -1; filter: blur(80px); opacity: 0.6; }
        
        header { padding: 30px 20px; text-align: center; border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); }
        .search-bar { width: 100%; max-width: 600px; padding: 15px 25px; border-radius: 50px; background: rgba(255,255,255,0.05); border: 1px solid var(--accent); color: white; outline: none; transition: 0.3s; }

        .container { max-width: 1200px; margin: auto; padding: 20px; }
        
        /* Glass Cards */
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 24px; padding: 20px; backdrop-filter: blur(20px); margin-bottom: 25px; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }

        input, select, button { background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 12px; font-size: 14px; }
        .btn-accent { background: linear-gradient(90deg, var(--accent), var(--secondary)); border: none; font-weight: bold; cursor: pointer; }
        .btn-del { background: rgba(255, 77, 77, 0.1); border: 1px solid var(--danger); color: var(--danger); cursor: pointer; }

        /* Folder Layout */
        .folder-section { margin-top: 40px; }
        .folder-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 20px; }
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        
        .file-card { background: var(--glass); border: 1px solid var(--border); border-radius: 15px; padding: 10px; text-align: center; position: relative; transition: 0.3s; }
        .file-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .preview { width: 100%; height: 110px; border-radius: 10px; background: #111; object-fit: cover; display: flex; align-items: center; justify-content: center; font-size: 30px; margin-bottom: 8px; }

        .trash-icon { position: absolute; top: 5px; right: 5px; cursor: pointer; background: var(--danger); border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; display: none; }
        .file-card:hover .trash-icon { display: block; }

        .folder-badge { font-size: 10px; background: var(--secondary); padding: 2px 8px; border-radius: 10px; margin-bottom: 5px; display: inline-block; }

        #uploadStatus { position: fixed; bottom: 20px; left: 20px; background: var(--accent); color: #000; padding: 10px 20px; border-radius: 10px; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="aurora"></div>

<header>
    <h1 style="letter-spacing: 3px;">AKASH <span style="color:var(--accent)">VAULT</span> PRO</h1>
    <input type="text" id="vaultSearch" class="search-bar" placeholder="🔍 Search folders or files..." onkeyup="renderVault()">
</header>

<div class="container">
    <div class="grid-3">
        <div class="card">
            <h3 style="margin-top:0">📁 Create Folder</h3>
            <div style="display:flex; gap:10px;">
                <input type="text" id="newFolderName" style="flex:1" placeholder="Folder Name...">
                <button class="btn-accent" onclick="addFolder()">ADD</button>
            </div>
            <div id="folderList" style="margin-top:15px; display:flex; flex-wrap:wrap; gap:5px;"></div>
        </div>

        <div class="card" style="grid-column: span 2;">
            <h3 style="margin-top:0">🚀 Bulk Upload (1000 Max)</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                <input type="text" id="filePrefix" placeholder="Name Prefix (e.g. Photo)">
                <select id="folderSelect"></select>
                <select id="fileType">
                    <option value="Photo">🖼️ Photo</option>
                    <option value="Doc">📄 Document</option>
                </select>
                <input type="file" id="fileInput" multiple style="grid-column: span 2;">
                <button class="btn-accent" onclick="startUpload()">UPLOAD FILES</button>
            </div>
        </div>
    </div>

    <div id="vaultContent"></div>
</div>

<div id="uploadStatus">Uploading... <span id="percent">0</span>%</div>

<script>
    const BOT_TOKEN = '8602910282:AAFyJAgqQnnCb1LsL8sIVOApK3kEvh9VGgo';
    const CHAT_ID = '6585524199';

    // Data Structure
    let state = JSON.parse(localStorage.getItem('akash_vault_state')) || {
        folders: ["Akash", "Wife", "Family"],
        files: []
    };

    function save() {
        localStorage.setItem('akash_vault_state', JSON.stringify(state));
        renderFolders();
        renderVault();
    }

    // --- Folder Logic ---
    function addFolder() {
        const name = document.getElementById('newFolderName').value.trim();
        if (name && !state.folders.includes(name)) {
            state.folders.push(name);
            document.getElementById('newFolderName').value = "";
            save();
        }
    }

    function deleteFolder(name) {
        if (confirm(`Delete folder "${name}"? Files will be moved to Akash.`)) {
            state.folders = state.folders.filter(f => f !== name);
            state.files.forEach(f => { if(f.folder === name) f.folder = "Akash"; });
            save();
        }
    }

    function renderFolders() {
        const list = document.getElementById('folderList');
        const select = document.getElementById('folderSelect');
        list.innerHTML = "";
        select.innerHTML = "";

        state.folders.forEach(f => {
            // Dropdown
            const opt = document.createElement('option');
            opt.value = f; opt.innerText = f;
            select.appendChild(opt);

            // Tags with delete option
            const tag = document.createElement('div');
            tag.className = 'folder-badge';
            tag.style.background = 'rgba(255,255,255,0.1)';
            tag.innerHTML = `${f} <span onclick="deleteFolder('${f}')" style="cursor:pointer; margin-left:5px; color:red;">×</span>`;
            list.appendChild(tag);
        });
    }

    // --- File Logic ---
    async function startUpload() {
        const files = document.getElementById('fileInput').files;
        const prefix = document.getElementById('filePrefix').value || "File";
        const folder = document.getElementById('folderSelect').value;
        const type = document.getElementById('fileType').value;
        const status = document.getElementById('uploadStatus');

        if (!files.length) return alert("Select files!");
        status.style.display = 'block';

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            document.getElementById('percent').innerText = Math.round(((i + 1) / files.length) * 100);

            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            const method = type === "Photo" ? "sendPhoto" : "sendDocument";
            formData.append(type === "Photo" ? "photo" : "document", file);
            formData.append('caption', `Vault: ${prefix}_${i+1} | Folder: ${folder}`);

            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/${method}`, { method: 'POST', body: formData });
                state.files.push({
                    id: Date.now() + Math.random(),
                    name: `${prefix}_${i+1}`,
                    folder: folder,
                    type: type,
                    preview: type === "Photo" ? URL.createObjectURL(file) : "📄"
                });
            } catch (e) { console.error("Upload Error"); }
        }

        status.style.display = 'none';
        document.getElementById('fileInput').value = "";
        save();
    }

    function deleteFile(id) {
        state.files = state.files.filter(f => f.id !== id);
        save();
    }

    function renderVault() {
        const container = document.getElementById('vaultContent');
        const search = document.getElementById('vaultSearch').value.toLowerCase();
        container.innerHTML = "";

        state.folders.forEach(folderName => {
            const filteredFiles = state.files.filter(f => 
                f.folder === folderName && 
                (f.name.toLowerCase().includes(search) || folderName.toLowerCase().includes(search))
            );

            if (filteredFiles.length > 0 || search === "") {
                const sec = document.createElement('div');
                sec.className = 'folder-section';
                sec.innerHTML = `
                    <div class="folder-header">
                        <h2>📂 ${folderName}</h2>
                        <span style="color:var(--accent)">${filteredFiles.length} Items</span>
                    </div>
                    <div class="file-grid">
                        ${filteredFiles.reverse().map(f => `
                            <div class="file-card">
                                <button class="trash-icon" onclick="deleteFile(${f.id})">×</button>
                                ${f.type === 'Photo' ? `<img src="${f.preview}" class="preview">` : `<div class="preview">📄</div>`}
                                <div style="font-size:12px; font-weight:bold; overflow:hidden; text-overflow:ellipsis;">${f.name}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(sec);
            }
        });
    }

    // Init
    renderFolders();
    renderVault();
</script>

</body>
</html>
