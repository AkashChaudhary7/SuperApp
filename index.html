<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akash OS | Premium Vault</title>
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #bc13fe;
            --bg: #0a0a0c;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at top right, #1a1a2e, #0a0a0c);
            color: white; min-height: 100vh; overflow-x: hidden;
        }

        /* --- Header & Search --- */
        header {
            padding: 20px; text-align: center; sticky: top;
            backdrop-filter: blur(10px); background: rgba(0,0,0,0.5);
            border-bottom: 1px solid var(--glass-border); z-index: 100;
        }

        .search-container { max-width: 600px; margin: 15px auto; position: relative; }
        .search-bar {
            width: 100%; padding: 12px 20px; border-radius: 30px;
            border: 1px solid var(--primary); background: rgba(0,0,0,0.3);
            color: white; font-size: 16px; outline: none; transition: 0.3s;
        }
        .search-bar:focus { box-shadow: 0 0 15px var(--primary); }

        .container { max-width: 1100px; margin: auto; padding: 20px; }

        /* --- Action Cards --- */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        @media (max-width: 768px) { .action-grid { grid-template-columns: 1fr; } }

        .glass-card {
            background: var(--glass); backdrop-filter: blur(15px);
            border-radius: 24px; padding: 25px; border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none; padding: 12px; border-radius: 12px; color: white;
            font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px;
        }

        input, select {
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            color: white; box-sizing: border-box;
        }

        /* --- Folder/File Grid --- */
        .section-title { font-size: 1.2rem; margin: 20px 0; display: flex; align-items: center; gap: 10px; }
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }

        .file-item {
            background: var(--glass); border-radius: 18px; padding: 15px;
            text-align: center; border: 1px solid var(--glass-border);
            transition: 0.3s ease; cursor: pointer; position: relative;
        }
        .file-item:hover { transform: translateY(-5px); background: rgba(255,255,255,0.1); }

        .icon-box {
            font-size: 40px; margin-bottom: 10px; height: 60px;
            display: flex; align-items: center; justify-content: center;
        }

        .file-name { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-date { font-size: 10px; color: #888; margin-top: 5px; }
        .category-badge {
            position: absolute; top: 10px; right: 10px; font-size: 9px;
            padding: 2px 6px; border-radius: 5px; background: var(--secondary);
        }

        .status-msg { font-size: 12px; color: var(--primary); text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h1 style="font-size: 1.5rem;">AKASH <span style="color:var(--secondary)">VAULT</span> PRO</h1>
    <div class="search-container">
        <input type="text" id="globalSearch" class="search-bar" placeholder="🔍 Find a document or photo..." onkeyup="filterItems()">
    </div>
</header>

<div class="container">
    
    <div class="action-grid">
        <div class="glass-card">
            <h3>📤 Bulk Upload</h3>
            <select id="fileCategory">
                <option value="Document">📄 Official Document</option>
                <option value="Photo">🖼️ Personal Photo</option>
            </select>
            <select id="fileMember">
                <option value="Akash">Akash</option>
                <option value="Wife">Wife</option>
                <option value="Family">Family</option>
            </select>
            <input type="file" id="bulkInput" multiple>
            <button class="btn-primary" onclick="handleUpload()">Upload Files to Telegram</button>
            <div id="uploadStatus" class="status-msg"></div>
        </div>

        <div class="glass-card">
            <h3>📊 Storage Stats</h3>
            <p style="color: #888; font-size: 14px;">Files are stored in your private Telegram channel. Unlimited free storage is active.</p>
            <div style="display: flex; gap: 20px; margin-top: 20px;">
                <div><strong id="countDocs">0</strong><br><small>Docs</small></div>
                <div><strong id="countPhotos">0</strong><br><small>Photos</small></div>
            </div>
        </div>
    </div>

    <h2 class="section-title">📂 Your Folders</h2>
    <div class="file-grid" id="mainGrid">
        </div>

</div>

<script>
    const BOT_TOKEN = '8602910282:AAFyJAgqQnnCb1LsL8sIVOApK3kEvh9VGgo';
    const CHAT_ID = '6585524199';

    // Load saved data
    let vaultItems = JSON.parse(localStorage.getItem('akash_pro_vault')) || [];

    async function handleUpload() {
        const files = document.getElementById('bulkInput').files;
        const category = document.getElementById('fileCategory').value;
        const member = document.getElementById('fileMember').value;
        const status = document.getElementById('uploadStatus');

        if (files.length === 0) return alert("Select files first!");

        status.innerText = `Starting upload of ${files.length} files...`;

        for (let file of files) {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            
            // Choose API method based on type
            const method = category === 'Photo' ? 'sendPhoto' : 'sendDocument';
            const field = category === 'Photo' ? 'photo' : 'document';
            
            formData.append(field, file);
            formData.append('caption', `⚡ VAULT UPLOAD\nType: ${category}\nOwner: ${member}\nName: ${file.name}`);

            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/${method}`, {
                    method: 'POST',
                    body: formData
                });
                
                if (res.ok) {
                    vaultItems.push({
                        name: file.name,
                        type: category,
                        member: member,
                        date: new Date().toLocaleDateString()
                    });
                }
            } catch (e) { console.error("Upload failed for", file.name); }
        }

        localStorage.setItem('akash_pro_vault', JSON.stringify(vaultItems));
        status.innerText = "All files uploaded successfully!";
        renderItems();
    }

    function renderItems(filter = "") {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = "";

        const filtered = vaultItems.filter(item => 
            item.name.toLowerCase().includes(filter.toLowerCase()) || 
            item.member.toLowerCase().includes(filter.toLowerCase())
        );

        // Update Stats
        document.getElementById('countDocs').innerText = vaultItems.filter(i => i.type === 'Document').length;
        document.getElementById('countPhotos').innerText = vaultItems.filter(i => i.type === 'Photo').length;

        filtered.reverse().forEach(item => {
            const icon = item.type === 'Photo' ? '🖼️' : '📄';
            const card = document.createElement('div');
            card.className = 'file-item';
            card.innerHTML = `
                <div class="category-badge">${item.member}</div>
                <div class="icon-box">${icon}</div>
                <div class="file-name">${item.name}</div>
                <div class="file-date">${item.date}</div>
            `;
            grid.appendChild(card);
        });
    }

    function filterItems() {
        const query = document.getElementById('globalSearch').value;
        renderItems(query);
    }

    // Initial Render
    renderItems();
</script>

</body>
</html>
